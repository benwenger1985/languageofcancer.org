<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שפת הסרטן | בקרוב</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&family=Frank+Ruhl+Libre:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep: #0a0610;
      --mid: #0f0a18;
      --accent: #7b2d3e;
      --gold: #c9a96e;
      --soft: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.5);
    }

    html, body {
      height: 100%;
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(
        to bottom,
        #f4a35a 0%,
        #e8714a 8%,
        #c2466b 18%,
        #7b2d7a 30%,
        #3d1a6e 45%,
        #1a0a3c 62%,
        #0a0610 100%
      );
      background-attachment: fixed;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .stars span {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d, 4s) ease-in-out infinite var(--delay, 0s);
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50%       { opacity: var(--op, 0.7); transform: scale(1); }
    }

    /* ── Mountain silhouette ── */
    .mountains {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40vh;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Main layout ── */
    .hero {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem 10rem;
      text-align: center;
    }

    .logo-wrap {
      width: min(260px, 55vw);
      margin-bottom: 2.5rem;
      animation: floatIn 1.4s cubic-bezier(.16,1,.3,1) both;
      filter: drop-shadow(0 8px 40px rgba(0,0,0,0.6));
    }
    .logo-wrap img { width: 100%; display: block; }

    .title {
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 400;
      font-size: clamp(1.25rem, 3.5vw, 2rem);
      color: var(--text);
      line-height: 1.6;
      letter-spacing: 0.02em;
      margin-bottom: 1.2rem;
      animation: floatIn 1.6s cubic-bezier(.16,1,.3,1) .15s both;
      max-width: 600px;
    }

    .subtitle {
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: var(--gold);
      letter-spacing: 0.06em;
      animation: floatIn 1.6s cubic-bezier(.16,1,.3,1) .3s both;
      margin-bottom: 3rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 3rem;
      animation: floatIn 1.6s .45s both;
    }

    .coming-soon {
      font-family: 'Frank Ruhl Libre', serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2vw, 1.35rem);
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      animation: floatIn 1.6s .5s both;
    }

    /* ── Contact section ── */
    .contact {
      position: relative;
      z-index: 2;
      background: var(--mid);
      padding: 5rem 2rem;
      text-align: center;
    }
    .contact h2 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 400;
      margin-bottom: 0.5rem;
    }
    .contact .sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    .form-wrap {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-wrap input,
    .form-wrap textarea {
      background: var(--soft);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.85rem 1.1rem;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      text-align: right;
      direction: rtl;
      transition: border-color .2s;
      outline: none;
      width: 100%;
      resize: vertical;
    }
    .form-wrap input::placeholder,
    .form-wrap textarea::placeholder { color: var(--muted); }
    .form-wrap input:focus,
    .form-wrap textarea:focus { border-color: var(--gold); }

    .form-wrap button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.9rem 2rem;
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s, transform .15s;
      letter-spacing: 0.05em;
    }
    .form-wrap button:hover { background: #962e47; transform: translateY(-1px); }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Mountains SVG -->

        <stop offset="100%" stop-color="#0a0e1a" stop-opacity="1"/>

</div>

  <h1 class="title">ליווי ותמיכה בחולי.ות סרטן<br>בין כותלי בית החולים</h1>
  <p class="subtitle">הדרך החוצה היא פנימה..</p>
  <div class="divider"></div>
  <p class="coming-soon">האתר יעלה בקרוב</p>
</section>

<!-- Contact -->
<section class="contact">
  <h2>צרו קשר</h2>
  <p class="sub">נשמח לשמוע מכם</p>
  <div class="form-wrap">
    <input type="text" placeholder="שם">
    <input type="email" placeholder="אימייל" >
    <input type="tel" placeholder="טלפון" >
    <textarea rows="4" placeholder="הודעה"></textarea>
    <button type="button" onclick="submitForm()">שלח</button>
  </div>
</section>

<script>
  // Generate stars
  const container = document.getElementById('stars');
  for (let i = 0; i < 200; i++) {
    const s = document.createElement('span');
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${(Math.random()*5+2).toFixed(1)}s;
      --delay:-${(Math.random()*8).toFixed(1)}s;
      --op:${(Math.random()*0.5+0.3).toFixed(2)};
    `;
    container.appendChild(s);
  }
</script>

<script>
async function submitForm() {
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const msg   = document.getElementById('f-msg').value.trim();
  const status = document.getElementById('form-status');

  if (!name || !email) {
    status.style.display = 'block';
    status.style.color = '#e07070';
    status.textContent = 'נא למלא שם ואימייל';
    return;
  }

  const btn = document.querySelector('#contact-form button');
  btn.disabled = true;
  btn.textContent = 'שולח...';

  try {
    const res = await fetch('https://formspree.io/f/xnjlokzj', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ name, email, phone, message: msg })
    });
    if (res.ok) {
      status.style.display = 'block';
      status.style.color = 'var(--gold)';
      status.textContent = 'ההודעה נשלחה! נחזור אליך בקרוב 🙏';
      btn.textContent = 'נשלח ✓';
      document.getElementById('f-name').value = '';
      document.getElementById('f-email').value = '';
      document.getElementById('f-phone').value = '';
      document.getElementById('f-msg').value = '';
    } else {
      throw new Error();
    }
  } catch {
    status.style.display = 'block';
    status.style.color = '#e07070';
    status.textContent = 'אירעה שגיאה, נסה שוב';
    btn.disabled = false;
    btn.textContent = 'שלח';
  }
}
</script>
